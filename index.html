<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agendamento Odontológico 2026 - CBA X</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f2f4f8; margin:0; }
header { background:#0a2c6d; color:white; text-align:center; padding:20px; }
header img { width:120px; margin-bottom:10px; }
.container { background:white; max-width:900px; margin:30px auto; padding:25px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
label { font-weight:bold; margin-top:15px; display:block; }
input, select { width:100%; padding:8px; margin-top:5px; }
button { margin-top:20px; padding:12px; background:#c00000; color:white; border:none; width:100%; font-size:16px; cursor:pointer; }
button:hover { background:#900000; }
h2 { border-bottom:2px solid #0a2c6d; padding-bottom:5px; }
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agendamento Odontológico 2026</h1>
<p>Comando de Bombeiros de Área X</p>
</header>

<div class="container">

<h2>Dados do Militar</h2>

<label>Unidade em que Serve:</label>
<select id="unidadeServe">
<option value="">Selecione</option>
<option>CBA X</option>
<option>1º GMAR (Botafogo)</option>
<option>2º GMAR (Barra da Tijuca)</option>
<option>3º GMAR (Copacabana)</option>
<option>4º GMAR (Itaipu)</option>
<option>DBM 1/M (Paquetá)</option>
<option>DBM 2/M (Piscinão de Ramos)</option>
<option>DBM 3/M (Recreio)</option>
<option>DBM 4/M (Barra de Guaratiba)</option>
<option>DBM 5/M (Sepetiba)</option>
<option>DBM 6/M (Itaipu)</option>
<option>CER</option>
</select>

<label>Posto/Graduação:</label>
<select id="posto">
<option value="">Selecione</option>
<option>CEL BM</option>
<option>TC BM</option>
<option>MAJ BM</option>
<option>CAP BM</option>
<option>1º TEN BM</option>
<option>2º TEN BM</option>
<option>SUBTEN BM</option>
<option>1º SGT BM</option>
<option>2º SGT BM</option>
<option>3º SGT BM</option>
<option>CB BM</option>
<option>SD BM</option>
</select>

<label>Nome Completo:</label>
<input type="text" id="nome">

<label>RG:</label>
<input type="text" id="rg">

<label>Telefone:</label>
<input type="text" id="telefone">

<label>Email:</label>
<input type="email" id="email">

<h2>Agendamento</h2>

<label>Unidade de Atendimento:</label>
<select id="unidade" onchange="carregarDatas()">
<option value="">Selecione</option>
<option value="1GMAR">1º GMAR - BOTAFOGO</option>
<option value="2GMAR">2º GMAR - BARRA</option>
<option value="3GMAR">3º GMAR - COPACABANA</option>
<option value="4GMAR">4º GMAR - ITAIPU</option>
</select>

<label>Data:</label>
<select id="data" onchange="carregarHorarios()"></select>

<label>Horário:</label>
<select id="horario"></select>

<button onclick="salvar()">Confirmar Agendamento</button>

</div>

<script>

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_STORAGE",
messagingSenderId: "SEU_SENDER_ID",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const datas = {
"1GMAR":["11/03/26","18/03/26","25/03/26"],
"2GMAR":["10/03/26","17/03/26","24/03/26"],
"3GMAR":["10/03/26","17/03/26","24/03/26"],
"4GMAR":["10/04/26","17/04/26"]
};

function gerarHorarios(inicio, quantidade){
let lista=[];
let hora=new Date("2000-01-01T"+inicio+":00");
for(let i=0;i<quantidade;i++){
lista.push(hora.toTimeString().slice(0,5));
hora.setMinutes(hora.getMinutes()+15);
}
return lista;
}

function carregarDatas(){
let unidade=document.getElementById("unidade").value;
let selectData=document.getElementById("data");
let selectHorario=document.getElementById("horario");

selectData.innerHTML="";
selectHorario.innerHTML="";

if(!unidade) return;

datas[unidade].forEach(d=>{
let op=document.createElement("option");
op.value=d;
op.text=d;
selectData.appendChild(op);
});
}

function carregarHorarios(){
let unidade=document.getElementById("unidade").value;
let data=document.getElementById("data").value;
let selectHorario=document.getElementById("horario");

selectHorario.innerHTML="";

if(!unidade || !data) return;

let horarios=[];
if(unidade==="1GMAR") horarios=gerarHorarios("08:00",14);
if(unidade==="2GMAR") horarios=[...gerarHorarios("08:00",14),...gerarHorarios("13:00",7)];
if(unidade==="3GMAR") horarios=gerarHorarios("08:00",11);
if(unidade==="4GMAR") horarios=gerarHorarios("08:00",13);

horarios.forEach(h=>{
let op=document.createElement("option");
op.value=h;
op.text=h;
selectHorario.appendChild(op);
});
}

async function salvar(){

let dados={
unidadeServe:document.getElementById("unidadeServe").value,
posto:document.getElementById("posto").value,
nome:document.getElementById("nome").value,
rg:document.getElementById("rg").value,
telefone:document.getElementById("telefone").value,
email:document.getElementById("email").value,
unidade:document.getElementById("unidade").value,
data:document.getElementById("data").value,
horario:document.getElementById("horario").value,
criadoEm:new Date()
};

await db.collection("agendamentos").add(dados);

alert("Agendamento realizado com sucesso!");
location.reload();
}

</script>

</body>
</html>
