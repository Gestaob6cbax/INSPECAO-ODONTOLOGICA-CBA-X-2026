<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agendamento Odonto CBAX</title>
</head>
<body>

  <h2>Agendamento Odontológico</h2>

  <input type="text" id="nome" placeholder="Nome do Militar">
  <button onclick="salvar()">Agendar</button>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
      authDomain: "agendamento-odonto-cbax.firebaseapp.com",
      projectId: "agendamento-odonto-cbax",
      storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
      messagingSenderId: "545212689993",
      appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function salvar() {
      const nome = document.getElementById("nome").value;

      db.collection("agendamentos").add({
        nome: nome,
        data: new Date()
      });

      alert("Agendamento salvo!");
    }
  </script>

</body>
</html>
