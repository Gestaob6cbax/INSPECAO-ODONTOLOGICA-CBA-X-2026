<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Odontologia 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --cba-blue: #0a2c6d; --cba-gold: #b8860b; --cba-light: #e7f0ff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; margin: 0; }
        
        header { 
            background: var(--cba-blue); 
            color: white; 
            padding: 30px; 
            text-align: center; 
            border-bottom: 5px solid var(--cba-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        header h1 { margin: 0; text-transform: uppercase; font-size: 24px; letter-spacing: 2px; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { 
            background: white; 
            flex: 1; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid var(--cba-gold);
        }
        .card span { display: block; color: #888; text-transform: uppercase; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .card strong { font-size: 30px; color: var(--cba-blue); }

        .toolbar { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .search-box { width: 60%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-excel { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fcfcfc; color: #888; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 2px solid #f0f0f0; }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid #f9f9f9; color: #444; }
        tr:hover { background: #f0f5ff; }

        .badge-local { background: var(--cba-light); color: var(--cba-blue); padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Gestão de Agendamento Odontológico - 2026</h1>
    <p>CBA X - Salvamento Marítimo</p>
</header>

<div class="container">
    <div class="stats-row">
        <div class="card">
            <span>Militares Agendados</span>
            <strong id="total-count">0</strong>
        </div>
        <div class="card">
            <span>Status</span>
            <strong id="status-txt" style="color: #28a745; font-size: 18px;">CONECTADO</strong>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="buscaNome" class="search-box" placeholder="Pesquisar militar..." onkeyup="filtrarTabela()">
        <button class="btn-excel" onclick="exportarExcel()">📊 Exportar Excel</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Local Destino</th>
                    <th>Origem</th>
                    <th>Data/Hora</th>
                    <th>Posto/Grad</th>
                    <th>Nome</th>
                    <th>RG</th>
                </tr>
            </thead>
            <tbody id="tabela-dados">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ESSA PARTE ABAIXO É A QUE PUXA OS DADOS DE VERDADE
    db.collection("agendamentos").onSnapshot((snapshot) => {
        const tabela = document.getElementById("tabela-dados");
        document.getElementById("total-count").innerText = snapshot.size;
        tabela.innerHTML = "";

        if (snapshot.empty) {
            tabela.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:20px;'>Nenhum dado encontrado no banco.</td></tr>";
        }

        snapshot.forEach((doc) => {
            const d = doc.data();
            // Aqui eu forço o código a aceitar qualquer nome de campo (unidadeDestino, local, ou unidade)
            const localDestino = d.unidadeDestino || d.local || d.unidade || "---";
            const localOrigem = d.unidadeOrigem || d.origem || "---";

            tabela.innerHTML += `
                <tr>
                    <td><span class="badge-local">${localDestino}</span></td>
                    <td>${localOrigem}</td>
                    <td>${d.data || ''} - ${d.horario || ''}</td>
                    <td>${d.posto || ''}</td>
                    <td style="font-weight:bold;">${d.nome || ''}</td>
                    <td>${d.rg || ''}</td>
                </tr>
            `;
        });
    }, (error) => {
        document.getElementById("status-txt").innerText = "ERRO DE CONEXÃO";
        document.getElementById("status-txt").style.color = "red";
    });

    function filtrarTabela() {
        const termo = document.getElementById("buscaNome").value.toUpperCase();
        document.querySelectorAll("#tabela-dados tr").forEach(linha => {
            linha.style.display = linha.innerText.toUpperCase().includes(termo) ? "" : "none";
        });
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
        XLSX.writeFile(wb, "Relatorio_CBAX_Odonto.xlsx");
    }
</script>
</body>
</html>
