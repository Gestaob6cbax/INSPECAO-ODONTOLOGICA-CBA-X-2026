<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo - CBA X</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f2f4f8; margin:0; }
header { background:#0a2c6d; color:white; text-align:center; padding:20px; }
.container { max-width:1100px; margin:30px auto; background:white; padding:25px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
table { width:100%; border-collapse: collapse; margin-top:20px;}
th, td { border:1px solid #ddd; padding:8px; text-align:center;}
th { background:#0a2c6d; color:white;}
button { margin-top:20px; padding:10px 20px; background:#c00000; color:white; border:none; cursor:pointer;}
button:hover { background:#900000;}
</style>
</head>

<body>

<header>
<h1>Painel Administrativo</h1>
<p>Agendamento Odontológico 2026 - CBA X</p>
</header>

<div class="container">

<button onclick="exportarExcel()">Exportar para Excel</button>

<table id="tabela">
<thead>
<tr>
<th>Unidade</th>
<th>Data</th>
<th>Horário</th>
<th>Nome</th>
<th>Posto</th>
<th>RG</th>
<th>Telefone</th>
<th>Email</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
authDomain: "agendamento-odonto-cbax.firebaseapp.com",
projectId: "agendamento-odonto-cbax",
storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
messagingSenderId: "545212689993",
appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function carregarDados(){

const snapshot = await db.collection("agendamentos").orderBy("criadoEm","desc").get();

const tbody = document.querySelector("#tabela tbody");
tbody.innerHTML="";

snapshot.forEach(doc=>{
const d = doc.data();

tbody.innerHTML += `
<tr>
<td>${d.unidadeServe || "-"}</td>
<td>${d.data || "-"}</td>
<td>${d.horario || "-"}</td>
<td>${d.nome || "-"}</td>
<td>${d.posto || "-"}</td>
<td>${d.rg || "-"}</td>
<td>${d.telefone || "-"}</td>
<td>${d.email || "-"}</td>
</tr>
`;
});

}

async function exportarExcel(){

const snapshot = await db.collection("agendamentos").get();

let csv = "Unidade que Serve,Data,Horário,Nome,Posto,RG,Telefone,Email\n";

snapshot.forEach(doc=>{
const d = doc.data();
csv += `${d.unidadeServe || ""},${d.data || ""},${d.horario || ""},${d.nome || ""},${d.posto || ""},${d.rg || ""},${d.telefone || ""},${d.email || ""}\n`;
});

const blob = new Blob([csv], { type: "text/csv" });
const url = window.URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "agendamentos_2026.csv";
a.click();
window.URL.revokeObjectURL(url);

}

carregarDados();

</script>

</body>
</html>
