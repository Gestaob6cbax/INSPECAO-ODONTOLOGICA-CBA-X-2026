<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - AGENDAMENTO ODONTOLÓGICO 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --odonto-cyan: #00838f; --cba-blue: #0a2c6d; --cba-red: #b71c1c; --warning: #ff8f00; --excel-green: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        header { 
            background: var(--odonto-cyan); 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            border-bottom: 5px solid var(--cba-blue); 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        
        .contador-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            min-width: 100px;
        }
        .contador-box span { display: block; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .contador-box strong { font-size: 1.5rem; display: block; }

        .header-title h1 { margin: 0; font-size: 1.3rem; text-transform: uppercase; }
        .header-title p { margin: 0; font-size: 0.85rem; font-weight: bold; opacity: 0.9; }

        .header-right img { width: 65px; height: auto; }

        .controls { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; }
        input#lupa { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        
        .btn-refresh { padding: 12px 15px; cursor: pointer; border-radius: 8px; background: var(--odonto-cyan); color: white; border: none; font-weight: bold; }
        .btn-excel { background: var(--excel-green); color: white; border: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-mass-del { background: var(--cba-red); color: white; border: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
        .btn-danger-zone { background: var(--warning); color: white; border: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #dee2e6; color: #666; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .btn-individual-del { color: var(--cba-red); cursor: pointer; border: 1px solid #ffcdd2; padding: 4px 8px; border-radius: 5px; background: #fff5f5; font-size: 14px; }

        .import-section { margin-top: 30px; padding: 20px; background: #e8f5e9; border: 2px dashed var(--excel-green); border-radius: 10px; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-family: monospace; font-size: 12px; }
        .btn-import { background: var(--cba-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="contador-box">
            <span>Agendados</span>
            <strong id="contadorTotal">0</strong>
        </div>
        <div class="header-title">
            <h1>Painel ADM Odonto</h1>
            <p>CBA X - AGENDAMENTO ODONTOLÓGICO 2026</p>
        </div>
    </div>
    <div class="header-right">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="Logo CBA X">
    </div>
</header>

<div class="controls">
    <input type="checkbox" id="selectAll" onclick="toggleSelectAll()" title="Selecionar Todos">
    <input type="text" id="lupa" placeholder="🔍 Filtrar por Nome, RG, Unidade ou Local..." oninput="filtrar()">
    <button class="btn-refresh" onclick="carregarDados()">🔄 Atualizar</button>
    <button class="btn-excel" onclick="baixarExcel()">📥 BAIXAR EXCEL</button>
    <button id="btnExcluirMassa" class="btn-mass-del" onclick="excluirSelecionados()">🗑️ Excluir Selecionados</button>
    <button class="btn-danger-zone" onclick="resetarBancoCompleto()">⚠️ LIMPAR TUDO</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th width="30">Sel.</th>
                <th>Data</th>
                <th>Turno</th>
                <th>Local Atendimento</th>
                <th>Unidade</th>
                <th>Nome</th>
                <th>Posto</th>
                <th>RG</th>
                <th style="text-align:center;">Ação</th>
            </tr>
        </thead>
        <tbody id="tabelaDados">
            <tr><td colspan="9" style="text-align:center; padding:30px;">Iniciando sistema...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const corpo = document.getElementById("tabelaDados");
        const contador = document.getElementById("contadorTotal");
        corpo.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:20px;'>🔄 Sincronizando...</td></tr>";
        
        try {
            const snap = await db.collection("agendamentos_odonto").get();
            let lista = [];
            snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));
            
            lista.sort((a,b) => {
                const dateA = a.data ? a.data.split('/').reverse().join('') : '';
                const dateB = b.data ? b.data.split('/').reverse().join('') : '';
                return dateA.localeCompare(dateB);
            });

            let html = "";
            lista.forEach(d => {
                html += `<tr>
                    <td><input type="checkbox" class="row-check" value="${d.id}" onclick="showMassDelBtn()"></td>
                    <td><b>${d.data || '-'}</b></td>
                    <td>${d.turno || '-'}</td>
                    <td><small>${d.localAtendimento || '-'}</small></td>
                    <td><small style="color:blue">${d.unidadeOrigem || '-'}</small></td>
                    <td>${d.nome || '-'}</td>
                    <td>${d.posto || '-'}</td>
                    <td><code>${d.rg || '-'}</code></td>
                    <td style="text-align:center;"><button class="btn-individual-del" onclick="excluirIndividual('${d.id}')">🗑️</button></td>
                </tr>`;
            });
            corpo.innerHTML = html || "<tr><td colspan='9' style='text-align:center;'>Nenhum registro encontrado.</td></tr>";
            contador.innerText = lista.length;
            showMassDelBtn();
            document.getElementById("selectAll").checked = false;
        } catch (e) {
            corpo.innerHTML = "<tr><td colspan='9' style='color:red;'>Erro ao carregar dados.</td></tr>";
        }
    }

    function filtrar() {
        const busca = document.getElementById("lupa").value.toUpperCase();
        document.querySelectorAll("#tabelaDados tr").forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(busca) ? "" : "none";
        });
    }

    function toggleSelectAll() {
        const master = document.getElementById("selectAll").checked;
        document.querySelectorAll(".row-check").forEach(c => {
            if(c.closest('tr').style.display !== "none") c.checked = master;
        });
        showMassDelBtn();
    }

    function showMassDelBtn() {
        const qtd = document.querySelectorAll(".row-check:checked").length;
        document.getElementById("btnExcluirMassa").style.display = qtd > 0 ? "inline-block" : "none";
        document.getElementById("btnExcluirMassa").innerText = `🗑️ Excluir ${qtd} Selecionados`;
    }

    async function excluirIndividual(id) {
        if(confirm("Excluir este agendamento?")) {
            await db.collection("agendamentos_odonto").doc(id).delete();
            carregarDados();
        }
    }

    async function excluirSelecionados() {
        if(!confirm("Excluir agendamentos selecionados?")) return;
        const checks = document.querySelectorAll(".row-check:checked");
        for(let c of checks) await db.collection("agendamentos_odonto").doc(c.value).delete();
        carregarDados();
    }

    async function resetarBancoCompleto() {
        if(confirm("🚨 EXCLUIR TUDO? Esta ação não pode ser desfeita!")) {
            const snap = await db.collection("agendamentos_odonto").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Banco de dados limpo com sucesso!");
            carregarDados();
        }
    }

    function baixarExcel() {
        let csv = "Data;Turno;Local;Unidade;Nome;Posto;RG\n";
        document.querySelectorAll("#tabelaDados tr").forEach(linha => {
            const cols = linha.querySelectorAll("td");
            if(cols.length > 1) {
                let r = [];
                for(let i=1; i<8; i++) r.push(cols[i].innerText.replace(/;/g, ","));
                csv += r.join(";") + "\n";
            }
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "AGENDAMENTOS_ODONTO_2026.csv");
        link.click();
    }

    window.onload = carregarDados;
</script>
</body>
</html>
