<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo - CBAX</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; }
    header { background:#0a2c6d; color:white; text-align:center; padding:20px; }
    .container { max-width:1350px; margin:30px auto; background:white; padding:25px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    
    .login-box { max-width:400px; margin:120px auto; background:white; padding:30px; text-align:center; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    .password-container { position: relative; width: 100%; margin-top: 15px; }
    input[type=password], input[type=text] { padding:12px; width:100%; border:1px solid #ccc; border-radius:4px; box-sizing: border-box; font-size: 16px; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; background:none; border:none; font-size:20px; }

    .top-bar { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom: 20px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border:1px solid #ddd; padding:10px; text-align:center; font-size: 13px;}
    th { background:#0a2c6d; color:white; text-transform: uppercase; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    
    button { padding:10px 18px; border:none; cursor:pointer; border-radius:4px; font-weight:bold; transition: 0.3s; }
    .btn-login { background:#0a2c6d; color:white; width: 100%; margin-top: 15px; }
    .btn-cancel { background:#c00000; color:white; }
    .btn-export { background:#28a745; color:white; }
    button:hover { opacity: 0.8; }

    .counter { font-size: 1.1rem; font-weight:bold; color: #0a2c6d; }
    .badge-local { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; border: 1px solid #ffeeba; display: inline-block; }
    select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin: 0 5px; }
</style>
</head>

<body>

<div id="login" class="login-box">
    <h2>Acesso Administrativo</h2>
    <div class="password-container">
        <input type="password" id="senha" placeholder="Digite a senha" onkeypress="if(event.key === 'Enter') verificarSenha()">
        <button type="button" class="toggle-password" onclick="toggleSenha()">
            <span id="eye-icon">👁️</span>
        </button>
    </div>
    <button class="btn-login" onclick="verificarSenha()">Entrar</button>
</div>

<div id="painel" style="display:none;">
    <header>
        <h1>Painel Administrativo</h1>
        <p>Agendamento Odonto Inspeção 2026 - CBAX</p>
    </header>

    <div class="container">
        <div class="top-bar">
            <div>
                <label><strong>Filtrar Local:</strong></label>
                <select id="filtroUnidadeAgendada" onchange="carregarDados()">
                    <option value="">Todos os Locais</option>
                    <option value="1GMAR">1º GMAR - BOTAFOGO</option>
                    <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
                    <option value="3GMAR">3º GMAR - COPACABANA</option>
                    <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
                </select>

                <select id="filtroMes" onchange="carregarDados()">
                    <option value="">Todos os Meses</option>
                    <option value="/03/26">Março</option>
                    <option value="/04/26">Abril</option>
                    <option value="/05/26">Maio</option>
                </select>
            </div>

            <div>
                <button class="btn-cancel" onclick="cancelarSelecionados()">Excluir Selecionados</button>
                <button class="btn-export" onclick="exportarSelecionados()">Exportar Excel</button>
            </div>

            <div class="counter">Total: <span id="contador">0</span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selecionarTodos" onclick="toggleTodos()"></th>
                    <th>Local Agendado</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Nome</th>
                    <th>Posto</th>
                    <th>RG</th>
                    <th>Telefone</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>

<script>
const SENHA_ADMIN = "B6CBAX2023";

function toggleSenha() {
    const inputSenha = document.getElementById("senha");
    const eyeIcon = document.getElementById("eye-icon");
    if (inputSenha.type === "password") {
        inputSenha.type = "text";
        eyeIcon.innerText = "🙈";
    } else {
        inputSenha.type = "password";
        eyeIcon.innerText = "👁️";
    }
}

function verificarSenha(){
    const senhaDigitada = document.getElementById("senha").value;
    if(senhaDigitada === SENHA_ADMIN){
        document.getElementById("login").style.display="none";
        document.getElementById("painel").style.display="block";
        carregarDados();
    } else { 
        alert("Senha incorreta."); 
    }
}

const firebaseConfig = {
    apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
    authDomain: "agendamento-odonto-cbax.firebaseapp.com",
    projectId: "agendamento-odonto-cbax",
    storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
    messagingSenderId: "545212689993",
    appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function carregarDados(){
    const tabela = document.getElementById("tabela");
    const filtroLocal = document.getElementById("filtroUnidadeAgendada").value;
    const filtroMes = document.getElementById("filtroMes").value;
    
    tabela.innerHTML = "<tr><td colspan='9'>Buscando dados no banco...</td></tr>";

    try {
        const snapshot = await db.collection("agendamentos").get();
        tabela.innerHTML = "";
        let total = 0;

        snapshot.forEach(doc => {
            const d = doc.data();
            const localEfetivo = d.unidade || d.unidadeServe || "Não informado";
            const dataEfetiva = d.data || "";

            if(filtroLocal && !localEfetivo.includes(filtroLocal)) return;
            if(filtroMes && !dataEfetiva.includes(filtroMes)) return;

            total++;
            tabela.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="checkItem" value="${doc.id}"></td>
                    <td><span class="badge-local">${localEfetivo}</span></td>
                    <td>${dataEfetiva}</td>
                    <td>${d.horario || ""}</td>
                    <td>${d.nome || ""}</td>
                    <td>${d.posto || ""}</td>
                    <td>${d.rg || ""}</td>
                    <td>${d.telefone || ""}</td>
                    <td>${d.email || ""}</td>
                </tr>
            `;
        });

        document.getElementById("contador").innerText = total;
        if(total === 0) tabela.innerHTML = "<tr><td colspan='9'>Nenhum agendamento encontrado.</td></tr>";
    } catch (e) { 
        tabela.innerHTML = "<tr><td colspan='9'>Erro ao carregar dados.</td></tr>"; 
    }
}

function toggleTodos(){
    const master = document.getElementById("selecionarTodos");
    document.querySelectorAll(".checkItem").forEach(cb => cb.checked = master.checked);
}

async function cancelarSelecionados(){
    const checks = document.querySelectorAll(".checkItem:checked");
    if(checks.length === 0) return alert("Selecione ao menos um.");
    if(confirm("Deseja excluir os itens selecionados?")){
        for(let cb of checks) {
            await db.collection("agendamentos").doc(cb.value).delete();
        }
        alert("Excluído com sucesso.");
        carregarDados();
    }
}

function exportarSelecionados(){
    const checks = document.querySelectorAll(".checkItem:checked");
    if(checks.length === 0) return alert("Selecione os itens para exportar.");
    
    const dados = Array.from(checks).map(cb => {
        const r = cb.closest('tr').cells;
        return {
            "Local": r[1].innerText,
            "Data": r[2].innerText,
            "Horário": r[3].innerText,
            "Nome": r[4].innerText,
            "Posto": r[5].innerText,
            "RG": r[6].innerText,
            "Telefone": r[7].innerText,
            "Email": r[8].innerText
        };
    });

    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
    XLSX.writeFile(wb, "Relatorio_CBAX_2026.xlsx");
}
</script>
</body>
</html>
