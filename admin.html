<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Odontologia 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --cba-blue: #0a2c6d; --cba-gold: #b8860b; --danger: #d9534f; --success: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; margin: 0; }
        
        header { 
            background: var(--cba-blue); color: white; padding: 25px; text-align: center; 
            border-bottom: 5px solid var(--cba-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        .toolbar { 
            background: white; padding: 15px 20px; border-radius: 12px; 
            display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            align-items: center; flex-wrap: wrap;
        }

        .search-box { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-width: 200px; }

        .btn { border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-sync { background: var(--cba-blue); }
        .btn-excel { background: var(--success); }
        .btn-danger { background: var(--danger); display: none; } /* Escondido por padrão */
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fcfcfc; color: #888; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; font-size: 14px; border-bottom: 1px solid #f9f9f9; }
        
        tr.selected { background-color: #fff5f5; }
        .badge-local { background: #e7f0ff; color: var(--cba-blue); padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        
        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Gestão de Agendamento Odontológico - CBA X</h1>
</header>

<div class="container">
    <div class="toolbar">
        <input type="text" id="buscaNome" class="search-box" placeholder="Pesquisar militar..." onkeyup="filtrarTabela()">
        
        <button id="btnExcluirVarios" class="btn btn-danger" onclick="excluirSelecionados()">🗑️ Excluir Selecionados</button>
        <button class="btn btn-sync" onclick="location.reload()">🔄 Atualizar</button>
        <button class="btn btn-excel" onclick="exportarExcel()">📊 Excel</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selecionarTodos" onclick="marcarTodos(this)"></th>
                    <th>Local Destino</th>
                    <th>Origem</th>
                    <th>Posto/Nome</th>
                    <th>RG</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody id="tabela-dados"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Carregar dados
    db.collection("agendamentos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const tabela = document.getElementById("tabela-dados");
        tabela.innerHTML = "";

        snapshot.forEach((doc) => {
            const d = doc.data();
            const id = doc.id;

            tabela.innerHTML += `
                <tr id="row-${id}">
                    <td><input type="checkbox" class="check-item" value="${id}" onclick="atualizarBotaoExcluir()"></td>
                    <td><span class="badge-local">${d.unidadeDestino || d.local || '---'}</span></td>
                    <td>${d.unidadeOrigem || '---'}</td>
                    <td><b>${d.posto || ''} ${d.nome || ''}</b></td>
                    <td>${d.rg || ''}</td>
                    <td>${d.data || ''} - ${d.horario || ''}</td>
                </tr>
            `;
        });
        atualizarBotaoExcluir();
    });

    // Marcar/Desmarcar todos
    function marcarTodos(master) {
        const checks = document.querySelectorAll('.check-item');
        checks.forEach(c => c.checked = master.checked);
        atualizarBotaoExcluir();
    }

    // Mostrar/Esconder botão de excluir
    function atualizarBotaoExcluir() {
        const selecionados = document.querySelectorAll('.check-item:checked').length;
        const btn = document.getElementById('btnExcluirVarios');
        btn.style.display = selecionados > 0 ? 'flex' : 'none';
        btn.innerText = `🗑️ Excluir Selecionados (${selecionados})`;
    }

    // Exclusão em Massa
    async function excluirSelecionados() {
        const selecionados = document.querySelectorAll('.check-item:checked');
        if (confirm(`Tem certeza que deseja excluir ${selecionados.length} agendamentos de uma vez?`)) {
            
            const promises = Array.from(selecionados).map(cb => {
                return db.collection("agendamentos").doc(cb.value).delete();
            });

            try {
                await Promise.all(promises);
                alert("Agendamentos excluídos com sucesso!");
                document.getElementById('selecionarTodos').checked = false;
            } catch (error) {
                alert("Erro ao excluir alguns registros: " + error);
            }
        }
    }

    function filtrarTabela() {
        const termo = document.getElementById("buscaNome").value.toUpperCase();
        document.querySelectorAll("#tabela-dados tr").forEach(linha => {
            linha.style.display = linha.innerText.toUpperCase().includes(termo) ? "" : "none";
        });
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
        XLSX.writeFile(wb, "Agendamentos_Odonto_CBAX.xlsx");
    }
</script>
</body>
</html>
