<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo - CBAX</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; }
    header { background:#0a2c6d; color:white; text-align:center; padding:20px; }
    .container { max-width:1450px; margin:30px auto; background:white; padding:25px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    
    .login-box { max-width:400px; margin:120px auto; background:white; padding:30px; text-align:center; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    .password-container { position: relative; width: 100%; margin-top: 15px; }
    input[type=password], input[type=text] { padding:12px; width:100%; border:1px solid #ccc; border-radius:4px; box-sizing: border-box; font-size: 16px; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; background:none; border:none; font-size:20px; }

    .top-bar { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom: 20px; gap: 10px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border:1px solid #ddd; padding:10px; text-align:center; font-size: 12px;}
    th { background:#0a2c6d; color:white; text-transform: uppercase; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    
    button { padding:10px 18px; border:none; cursor:pointer; border-radius:4px; font-weight:bold; transition: 0.3s; }
    .btn-login { background:#0a2c6d; color:white; width: 100%; margin-top: 15px; }
    .btn-cancel { background:#c00000; color:white; }
    .btn-export { background:#28a745; color:white; }
    .btn-refresh { background:#007bff; color:white; } /* Cor do botão atualizar */
    button:hover { opacity: 0.8; }

    .counter { font-size: 1.1rem; font-weight:bold; color: #0a2c6d; }
    .badge-local { background: #fff3cd; color: #856404; padding: 4px 6px; border-radius: 4px; font-weight: bold; border: 1px solid #ffeeba; }
    .badge-origem { background: #e2e3e5; color: #383d41; padding: 4px 6px; border-radius: 4px; font-weight: normal; border: 1px solid #d6d8db; }
    select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
</style>
</head>

<body>

<div id="login" class="login-box">
    <img src="logo.png" style="width: 100px; margin-bottom: 15px;" alt="Logo CBAX" onerror="this.style.display='none';">
    <h2>Acesso Administrativo</h2>
    <div class="password-container">
        <input type="password" id="senha" placeholder="Digite a senha" onkeypress="if(event.key === 'Enter') verificarSenha()">
        <button type="button" class="toggle-password" onclick="toggleSenha()">
            <span id="eye-icon">👁️</span>
        </button>
    </div>
    <button class="btn-login" onclick="verificarSenha()">Entrar</button>
</div>

<div id="painel" style="display:none;">
    <header>
        <img src="logo.png" style="width: 60px; vertical-align: middle; margin-right: 15px;" onerror="this.style.display='none';">
        <h1 style="display:inline-block; vertical-align: middle;">Painel Administrativo CBAX</h1>
        <p>Agendamento Odonto Inspeção 2026</p>
    </header>

    <div class="container">
        <div class="top-bar">
            <div>
                <label><strong>Filtrar:</strong></label>
                <select id="filtroUnidadeAgendada" onchange="carregarDados()">
                    <option value="">Todos os Locais</option>
                    <option value="1GMAR">1º GMAR - BOTAFOGO</option>
                    <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
                    <option value="3GMAR">3º GMAR - COPACABANA</option>
                    <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
                </select>
                <button class="btn-refresh" onclick="carregarDados()" title="Atualizar Lista">
                    🔄 Atualizar Dados
                </button>
            </div>

            <div>
                <button class="btn-cancel" onclick="cancelarSelecionados()">Excluir Selecionados</button>
                <button class="btn-export" onclick="exportarSelecionados()">Exportar Excel</button>
            </div>

            <div class="counter">Total: <span id="contador">0</span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selecionarTodos" onclick="toggleTodos()"></th>
                    <th>Local Inspeção</th>
                    <th>Unidade Origem</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Nome</th>
                    <th>Posto</th>
                    <th>RG</th>
                    <th>Telefone</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>

<script>
const SENHA_ADMIN = "B6CBAX2023";

function toggleSenha() {
    const inputSenha = document.getElementById("senha");
    const eyeIcon = document.getElementById("eye-icon");
    if (inputSenha.type === "password") {
        inputSenha.type = "text"; eyeIcon.innerText = "🙈";
    } else {
        inputSenha.type = "password"; eyeIcon.innerText = "👁️";
    }
}

function verificarSenha(){
    if(document.getElementById("senha").value === SENHA_ADMIN){
        document.getElementById("login").style.display="none";
        document.getElementById("painel").style.display="block";
        carregarDados();
    } else { alert("Senha incorreta."); }
}

const firebaseConfig = {
    apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
    authDomain: "agendamento-odonto-cbax.firebaseapp.com",
    projectId: "agendamento-odonto-cbax",
    storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
    messagingSenderId: "545212689993",
    appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function carregarDados(){
    const tabela = document.getElementById("tabela");
    const filtroLocal = document.getElementById("filtroUnidadeAgendada").value;
    const contador = document.getElementById("contador");
    
    tabela.innerHTML = "<tr><td colspan='10'>🔄 Buscando dados atualizados...</td></tr>";

    try {
        const snapshot = await db.collection("agendamentos").get();
        tabela.innerHTML = "";
        let total = 0;

        snapshot.forEach(doc => {
            const d = doc.data();
            const localInspecao = d.unidade || "Não informado";
            const unidadeOrigem = d.unidadeServe || "CBA X";

            if(filtroLocal && !localInspecao.includes(filtroLocal)) return;

            total++;
            tabela.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="checkItem" value="${doc.id}"></td>
                    <td><span class="badge-local">${localInspecao}</span></td>
                    <td><span class="badge-origem">${unidadeOrigem}</span></td>
                    <td>${d.data || ""}</td>
                    <td>${d.horario || ""}</td>
                    <td>${d.nome || ""}</td>
                    <td>${d.posto || ""}</td>
                    <td>${d.rg || ""}</td>
                    <td>${d.telefone || ""}</td>
                    <td>${d.email || ""}</td>
                </tr>
            `;
        });

        contador.innerText = total;
        if(total === 0) tabela.innerHTML = "<tr><td colspan='10'>Nenhum agendamento encontrado.</td></tr>";
    } catch (e) { 
        tabela.innerHTML = "<tr><td colspan='10' style='color:red;'>Erro ao carregar dados.</td></tr>"; 
    }
}

function toggleTodos(){
    const master = document.getElementById("selecionarTodos");
    document.querySelectorAll(".checkItem").forEach(cb => cb.checked = master.checked);
}

async function cancelarSelecionados(){
    const checks = document.querySelectorAll(".checkItem:checked");
    if(checks.length === 0) return alert("Selecione os agendamentos que deseja excluir.");
    if(confirm(`Deseja excluir ${checks.length} agendamento(s)? Esta ação não pode ser desfeita.`)){
        for(let cb of checks) await db.collection("agendamentos").doc(cb.value).delete();
        alert("Excluído com sucesso!");
        carregarDados();
    }
}

function exportarSelecionados(){
    const checks = document.querySelectorAll(".checkItem:checked");
    if(checks.length === 0) return alert("Selecione os itens para exportar.");
    
    const dados = Array.from(checks).map(cb => {
        const r = cb.closest('tr').cells;
        return {
            "Local Inspeção": r[1].innerText,
            "Unidade Origem": r[2].innerText,
            "Data": r[3].innerText,
            "Horário": r[4].innerText,
            "Nome": r[5].innerText,
            "Posto": r[6].innerText,
            "RG": r[7].innerText,
            "Telefone": r[8].innerText,
            "Email": r[9].innerText
        };
    });

    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
    XLSX.writeFile(wb, "Relatorio_Agendamentos_Odonto_2026.xlsx");
}
</script>
</body>
</html>
