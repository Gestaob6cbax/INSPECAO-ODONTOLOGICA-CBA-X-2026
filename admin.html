<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM - Gestão Odontológica 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { 
            --cba-red: #b71c1c; 
            --cba-blue: #0a2c6d; 
            --bg: #f0f2f5;
            --success: #27ae60;
            --odonto-color: #009688;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { 
            background: var(--white); padding: 20px 30px; border-radius: 15px; display: flex; 
            justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 10px solid var(--odonto-color); margin-bottom: 25px;
        }
        .header-info h1 { margin: 0; color: var(--cba-blue); font-size: 1.6rem; }
        .card-destaque-geral {
            background: var(--odonto-color); color: white; padding: 20px; border-radius: 15px;
            text-align: center; margin-bottom: 25px;
        }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 3rem; font-weight: 900; }
        .section-title { font-size: 0.8rem; font-weight: bold; color: #555; text-transform: uppercase; margin: 25px 0 10px 5px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #ddd; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card-unidade { background: var(--white); padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--cba-blue); }
        .card-polo { background: var(--white); padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--success); }
        .controls-box { background: var(--white); padding: 20px; border-radius: 15px; display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        #lupa { flex-grow: 1; padding: 12px 20px; border: 2px solid #eee; border-radius: 10px; outline: none; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-refresh { background: var(--cba-blue); }
        .btn-excel { background: var(--success); }
        .btn-danger { background: var(--cba-red); }
        .table-container { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #888; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 0.85rem; }
        .import-box { background: var(--white); padding: 25px; border-radius: 15px; margin-top: 40px; border: 2px dashed #ccc; }
        textarea { width: 100%; height: 100px; margin: 15px 0; padding: 15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/agendamento-odonto-cbax/main/logo.png" width="60">
        <div class="header-info">
            <h1>Gestão Odontológica</h1>
            <p>CBA X - Painel Administrativo 2026</p>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-excel" onclick="baixarPlanilha()">📥 Exportar Excel</button>
        <button class="btn btn-danger" onclick="resetarTudo()">⚠️ Resetar Banco</button>
    </div>
</header>

<div class="card-destaque-geral">
    <h3>Total de Agendamentos Odontológicos</h3>
    <p id="totalGeral">0</p>
</div>

<div class="section-title">Efetivo por Unidade de Origem</div>
<div id="gridUnidades" class="grid-cards"></div>

<div class="section-title">Distribuição por Polo de Atendimento</div>
<div id="gridPolos" class="grid-cards"></div>

<div class="controls-box">
    <input type="text" id="lupa" placeholder="🔍 Pesquise..." onkeyup="filtrar()">
    <button class="btn btn-refresh" onclick="carregarDados()">🔄 Atualizar</button>
</div>

<div class="table-container">
    <table id="tabelaADM">
        <thead>
            <tr>
                <th>Data</th><th>Turno</th><th>Militar</th><th>RG Mil</th><th>Origem</th><th>Telefone</th><th>E-mail</th><th>Local</th><th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<div class="import-box">
    <h3>📥 Importar do Excel</h3>
    <textarea id="textoExcel" placeholder="Data | Turno | Militar | RG | Origem | Telefone | E-mail | Local"></textarea>
    <button class="btn btn-refresh" style="width: 100%; background: var(--success);" onclick="importarDados()">🚀 Sincronizar Agora</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const corpo = document.getElementById("corpoTabela");
        try {
            const snap = await db.collection("agendamentos_odonto").get();
            let lista = []; let uniMap = {}; let polMap = {};
            snap.forEach(doc => {
                const d = doc.data(); lista.push({id: doc.id, ...d});
                uniMap[d.unidadeServe] = (uniMap[d.unidadeServe] || 0) + 1;
                polMap[d.unidade] = (polMap[d.unidade] || 0) + 1;
            });
            lista.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            corpo.innerHTML = lista.map(d => `<tr><td>${d.data}</td><td>${d.turno}</td><td>${d.nome}</td><td>${d.rg}</td><td>${d.unidadeServe}</td><td>${d.telefone}</td><td>${d.email}</td><td>${d.unidade}</td><td><button onclick="excluirRegistro('${d.id}')">🗑️</button></td></tr>`).join('');
            document.getElementById("totalGeral").innerText = lista.length;
            renderResumo(uniMap, "gridUnidades", "card-unidade");
            renderResumo(polMap, "gridPolos", "card-polo");
        } catch (e) { console.log(e); }
    }

    function renderResumo(map, id, cls) {
        document.getElementById(id).innerHTML = Object.keys(map).sort().map(k => `<div class="${cls}"><h4>${k}</h4><p>${map[k]}</p></div>`).join('');
    }

    async function importarDados() {
        const linhas = document.getElementById("textoExcel").value.split('\n');
        for(let l of linhas) {
            const c = l.split('\t');
            if(c.length >= 8) {
                await db.collection("agendamentos_odonto").add({
                    data: c[0].trim(), turno: c[1].trim(), nome: c[2].trim().toUpperCase(), rg: c[3].trim(),
                    unidadeServe: c[4].trim(), telefone: c[5].trim(), email: c[6].trim(), unidade: c[7].trim(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }
        carregarDados();
    }

    async function excluirRegistro(id) { if(confirm("Excluir?")) { await db.collection("agendamentos_odonto").doc(id).delete(); carregarDados(); } }
    async function resetarTudo() { if(confirm("Zerar banco?")) { const s = await db.collection("agendamentos_odonto").get(); const b = db.batch(); s.forEach(d => b.delete(d.ref)); await b.commit(); carregarDados(); } }
    function filtrar() { const b = document.getElementById("lupa").value.toUpperCase(); document.querySelectorAll("#corpoTabela tr").forEach(r => r.style.display = r.innerText.toUpperCase().includes(b) ? "" : "none"); }
    function baixarPlanilha() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelaADM")), "Relatorio_Odonto.xlsx"); }
    window.onload = carregarDados;
</script>
</body>
</html>
